version: "3.1"

stories:
- story: test motivation helpful path
  steps:
    - user: |
        hi
      intent: greet
    - action: utter_greet
    - action: utter_ask_category
    - user: |
        give me a motivational quote
      intent: motivation
    - action: utter_motivation
    - action: utter_ask_helpful
    - user: |
        yes it helped
      intent: affirm
    - action: utter_happy_to_help

- story: test another quote path
  steps:
    - user: |
        give me a life quote
      intent: life
    - action: utter_life
    - action: utter_ask_helpful
    - user: |
        no it did not help
      intent: deny
    - action: utter_offer_another
    - user: |
        yes
      intent: affirm
    - action: utter_life
    - action: utter_ask_helpful

- story: test direct another quote path
  steps:
    - user: |
        give me a funny quote
      intent: funny
    - action: utter_funny
    - action: utter_ask_helpful
    - user: |
        another one
      intent: request_another
    - action: utter_funny
    - action: utter_ask_helpful

- story: test goodbye path
  steps:
    - user: |
        bye
      intent: goodbye
    - action: utter_goodbye
