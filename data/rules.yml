version: "3.1"

rules:
- rule: respond to greet
  steps:
    - intent: greet
    - action: utter_greet
    - action: utter_ask_category

- rule: fallback response
  steps:
    - intent: nlu_fallback
    - action: utter_default

- rule: respond goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: respond thanks
  steps:
    - intent: thanks
    - action: utter_thanks
